<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Избранное | OMOIKIRI KZ</title>
  <style>
    @font-face {
      font-family: "GothamProRegular";
      src: url("../assets/fonts/GothamProRegular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "GothamProBold";
      src: url("../assets/fonts/GothamProBold.woff") format("woff");
      font-weight: 700;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #111;
      background: #e9e9e9;
      font-family: "GothamProRegular", Arial, Helvetica, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      background: #fff;
      border-bottom: 1px solid #d8d8d8;
    }

    .head-main {
      position: relative;
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      align-items: center;
      height: 96px;
      padding: 0 48px;
    }

    .hamburger {
      width: 33px;
      height: 24px;
      border: 0;
      padding: 0;
      background: linear-gradient(#111, #111) 0 0 / 33px 4px no-repeat,
        linear-gradient(#111, #111) 0 10px / 33px 4px no-repeat,
        linear-gradient(#111, #111) 0 20px / 33px 4px no-repeat;
      border-radius: 0;
    }

    .phone {
      margin-left: 32px;
      font-family: "GothamProBold", Arial, sans-serif;
      font-size: 16px;
    }

    .brand {
      justify-self: center;
    }

    .brand img {
      display: block;
      width: 172px;
      height: auto;
    }

    .head-left,
    .head-actions {
      display: flex;
      align-items: center;
    }

    .head-actions {
      justify-self: end;
      gap: 28px;
    }

    .favorites-link {
      position: relative;
      display: block;
      width: 31px;
      height: 31px;
      background: url("../assets/img/default/heart.svg") center / 31px 31px no-repeat;
    }

    #favorites-count {
      position: absolute;
      right: -8px;
      bottom: 0;
      font: 400 11px/1 "GothamProRegular", Arial, sans-serif;
    }

    .search-icon {
      display: block;
      width: 33px;
      height: 33px;
      background: url("../assets/img/default/search.svg") center / 33px 33px no-repeat;
    }

    .site-nav {
      height: 47px;
      border-top: 1px solid #e3e3e3;
    }

    .site-nav ul {
      display: flex;
      justify-content: center;
      gap: 30px;
      height: 100%;
      margin: 0;
      padding: 0 24px;
      list-style: none;
    }

    .site-nav a {
      display: flex;
      align-items: center;
      height: 100%;
      font-size: 17px;
      white-space: nowrap;
    }

    .favorites-page {
      max-width: 1200px;
      margin: 0 auto 128px;
      padding-top: 50px;
    }

    h1 {
      margin: 0 0 25px;
      font-family: "GothamProBold", Arial, sans-serif;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .favorites-products table {
      width: 100%;
      margin-bottom: 25px;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    .favorites-products thead {
      background: #000;
      color: #fff;
    }

    .favorites-products th {
      padding: 11px 0 10px;
      font-family: "GothamProBold", Arial, sans-serif;
      font-size: 16px;
      text-align: center;
      text-transform: lowercase;
    }

    .favorites-products tbody tr {
      background: #fff;
      vertical-align: middle;
    }

    .favorites-products td {
      height: 104px;
      padding: 0 18px;
      text-align: center;
      vertical-align: middle;
      font-size: 16px;
    }

    .favorites-products td:first-child {
      width: 150px;
    }

    .favorites-products td:first-child img {
      display: block;
      width: 100px;
      height: 90px;
      margin: 0 auto;
      object-fit: contain;
    }

    .favorites-products td:nth-child(2) a {
      border-bottom: 1px solid #111;
      transition: color .2s ease, border-color .2s ease;
    }

    .favorites-products td:nth-child(4) {
      font-family: "GothamProBold", Arial, sans-serif;
    }

    .remove-from-favorites {
      width: 34px;
      height: 34px;
      border: 0;
      background: url("../assets/img/default/del.svg") center / 18px 18px no-repeat;
      cursor: pointer;
    }

    .empty {
      display: none;
      padding: 48px 0;
      font-family: "GothamProBold", Arial, sans-serif;
      font-size: 20px;
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    .clear-row,
    .export {
      display: flex;
      justify-content: flex-end;
    }

    .clear-row {
      margin-bottom: 28px;
    }

    .export {
      align-items: center;
      gap: 25px;
    }

    .share-link-container {
      display: flex;
      align-items: center;
      gap: 10px;
      width: max-content;
      max-width: min(460px, 100%);
      margin-right: auto;
      padding: 5px 15px;
      border-radius: 35px;
      background: #fff;
      cursor: pointer;
    }

    .copy-icon {
      position: relative;
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
    }

    .copy-icon::before,
    .copy-icon::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 18px;
      border: 2px solid #111;
      border-radius: 2px;
      background: #fff;
    }

    .copy-icon::before {
      left: 4px;
      top: 4px;
    }

    .copy-icon::after {
      left: 8px;
      top: 1px;
    }

    .share-link-container p {
      max-width: 390px;
      margin: 0;
      overflow: hidden;
      font-size: 16px;
      line-height: 40px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 28px;
      border: 1px solid #111;
      border-radius: 35px;
      background: #fff;
      color: #111;
      font-family: "GothamProBold", Arial, sans-serif;
      font-size: 16px;
      letter-spacing: 0;
      cursor: pointer;
    }

    .button.dark {
      min-width: 155px;
      border-color: #111;
      background: #1d1d1d;
      color: #fff;
      box-shadow: 0 12px 22px rgba(0, 0, 0, .22);
    }

    @media (max-width: 1300px) {
      .favorites-page {
        max-width: 100%;
        padding: 25px 50px 0;
      }

      h1 {
        margin-top: 25px;
      }
    }

    @media (max-width: 1000px) {
      .site-nav ul {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .head-main {
        grid-template-columns: 1fr auto 1fr;
        padding: 0 24px;
      }

      .phone {
        display: none;
      }

      .export {
        flex-wrap: wrap;
      }
    }

    @media (max-width: 850px) {
      .favorites-products thead {
        display: none;
      }

      .favorites-products tbody {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .favorites-products tbody tr {
        display: flex;
        flex: 1 1 calc(50% - 8px);
        flex-direction: column;
        align-items: center;
        padding: 16px;
      }

      .favorites-products td {
        display: block;
        width: 100% !important;
        height: auto;
        padding: 8px 0;
      }

      .export {
        flex-direction: column;
        align-items: flex-start;
      }

      .clear-row {
        justify-content: flex-start;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 18mm 16mm;
      }

      * {
        box-shadow: none !important;
        text-shadow: none !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        background: #fff !important;
        color: #000 !important;
        font-family: Arial, Helvetica, sans-serif !important;
      }

      .site-header,
      .head-main,
      .site-nav,
      .favorites-link,
      .search-icon,
      html body .dealer-local-cart-tab,
      html body a.dealer-local-cart-tab,
      html body .dealer-local-cart-tab svg,
      .dealer-local-cart-tab,
      .cart-link,
      .cart-icon,
      .cart-count,
      .cart-counter,
      [href*="cart"],
      .clear-row,
      .export,
      .remove-from-favorites,
      .remove-head,
      .favorites-products .remove-cell,
      .lang-switch {
        display: none !important;
        visibility: hidden !important;
      }

      .favorites-page {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .print-logo {
        display: block !important;
        width: 190px;
        height: auto;
        margin: 0 auto 30px;
      }

      h1 {
        display: none;
      }

      .favorites-products table {
        width: 100%;
        border-collapse: collapse;
        border-spacing: 0;
        table-layout: fixed;
        margin: 0;
        border: 1.5px solid #000;
        page-break-inside: auto;
      }

      .favorites-products thead {
        display: table-header-group !important;
        background: #fff !important;
        color: #000 !important;
      }

      .favorites-products tbody {
        display: table-row-group !important;
      }

      .favorites-products tr {
        display: table-row !important;
        background: #fff !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .favorites-products th,
      .favorites-products td {
        display: table-cell !important;
        height: auto;
        border: 1.5px solid #000;
        padding: 9px 10px;
        color: #000 !important;
        font-family: Arial, Helvetica, sans-serif !important;
        font-size: 14px;
        line-height: 1.25;
        text-align: center;
        vertical-align: middle;
      }

      .favorites-products th {
        font-weight: 400;
        text-transform: lowercase;
      }

      .favorites-products th:nth-child(1),
      .favorites-products td:nth-child(1) {
        width: 21%;
      }

      .favorites-products th:nth-child(2),
      .favorites-products td:nth-child(2) {
        width: 44%;
      }

      .favorites-products th:nth-child(3),
      .favorites-products td:nth-child(3) {
        width: 16%;
      }

      .favorites-products th:nth-child(4),
      .favorites-products td:nth-child(4) {
        width: 19%;
      }

      .favorites-products .price-cell {
        display: table-cell !important;
        visibility: visible !important;
      }

      .favorites-products td:nth-child(2) a {
        border-bottom: 0 !important;
        text-decoration: none !important;
      }

      .favorites-products td:first-child img {
        display: block !important;
        width: 86px;
        height: 70px;
        margin: 0 auto;
        object-fit: contain;
      }

      .print-total {
        display: block !important;
        margin-top: 24px;
        text-align: right;
        font-family: Arial, Helvetica, sans-serif !important;
        font-size: 16px;
        font-weight: 700;
      }
    }

    .print-logo,
    .print-total {
      display: none;
    }
  </style>
</head>
